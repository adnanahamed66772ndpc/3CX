; PJSIP: minimal internal endpoints for testing (1001, 1002).
; Adjust transport and aors to match your network.

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

[1001]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=1001-auth
aors=1001-aor
direct_media=no

[1001-auth]
type=auth
auth_type=userpass
password=1001
username=1001

[1001-aor]
type=aor
max_contacts=1

[1002]
type=endpoint
context=internal
disallow=all
allow=ulaw
auth=1002-auth
aors=1002-aor
direct_media=no

[1002-auth]
type=auth
auth_type=userpass
password=1002
username=1002

[1002-aor]
type=aor
max_contacts=1
