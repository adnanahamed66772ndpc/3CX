; AMI event filtering examples (reduce event volume).
; Asterisk recommends filtering to lower bandwidth and CPU. Options:
;
; 1) After login, send the Filter action from your app to limit events:
;    Action: Filter
;    Operation: Add
;    Filter: Event: Hangup
;    Filter: Event: OriginateResponse
;    (Add only the event types you need.)
;
; 2) In manager.conf you can restrict what a user receives (version-dependent).
;    Some builds support per-user event masks. Example (syntax may vary by version):
;
; [myamiuser]
; ... secret, permit, read, write ...
; ; Only receive these event types (if supported):
; ; eventmask=Hangup,OriginateResponse,Dial,Newchannel,Newstate
;
; 3) Avoid dumping full channel variables on every event (high overhead):
;    In manager.conf [general] do not enable options that dump variables
;    unless you need them.
;
; Reference: Asterisk AMI Filter action and manager.conf sample.
