; AMI: allow only your backend server IP. Do NOT expose on public IP.
; TLS on port 5039 recommended for production.

[general]
enabled=yes
port=5038
bindaddr=0.0.0.0
; TLS (production): use port 5039 and set tlsenable=yes, cert paths.

[myamiuser]
secret=change-me
deny=0.0.0.0/0.0
permit=127.0.0.1/255.255.255.255
; Add your backend server IP, e.g.:
; permit=192.168.1.100/255.255.255.255
read=system,call,log,verbose,agent,user,config,dtmf,reporting,cdr,dialplan
write=system,call,agent,user,config,command,reporting,originate

; Event filtering (recommended to reduce load). See manager-eventfilter.conf
; for Filter action and eventmask examples.
