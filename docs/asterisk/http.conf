; ARI requires the Asterisk HTTP server.
; Ports: 8088 = HTTP, 8089 = HTTPS (when tlsenable=yes).
; For production use TLS and bind to your Asterisk server IP only.

[general]
enabled=yes
bindaddr=0.0.0.0
tlsenable=no
port=8088
; TLS (production):
; tlsenable=yes
; tlsbindaddr=0.0.0.0:8089
; tlscertfile=/var/lib/asterisk/keys/asterisk.pem
; tlsprivatekey=/var/lib/asterisk/keys/asterisk.pem
