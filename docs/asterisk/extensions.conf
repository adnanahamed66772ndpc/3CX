; Example dialplan: send channel to ARI app "myapp" (Stasis).
; Replace "myapp" with your ARI_APP env value.

[ari-entry]
; Extension 7000 enters the ARI application
exten => 7000,1,NoOp(Enter ARI app)
 same => n,Stasis(myapp)
 same => n,Hangup()

; Internal context (PJSIP endpoints 1001, 1002 can dial each other, 7000, and outbound via trunk)
[internal]
exten => 1001,1,Dial(PJSIP/1001,30)
exten => 1002,1,Dial(PJSIP/1002,30)
exten => 7000,1,Stasis(myapp)
; Outbound via SIP trunk (requires pjsip-trunk.conf.sample merged into pjsip.conf): 9 + number
exten => _9NXXNXXXXXX,1,Dial(PJSIP/${EXTEN:1}@mytrunk,60)
exten => _9.,1,Dial(PJSIP/${EXTEN:1}@mytrunk,60)
exten => _X.,1,Dial(PJSIP/${EXTEN},30)

; Inbound from SIP trunk (DID routing) - add your DID(s), merge pjsip-trunk.conf.sample first
[from-trunk]
; Replace 15551234567 with your real DID
exten => 15551234567,1,NoOp(Inbound to DID ${EXTEN})
 same => n,Stasis(myapp)
 same => n,Hangup()
exten => _X.,1,NoOp(Inbound from trunk to ${EXTEN})
 same => n,Stasis(myapp)
 same => n,Hangup()
