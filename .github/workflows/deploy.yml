name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/astriks' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -e
            export DEPLOY_PATH="${DEPLOY_PATH:-/opt/astriks}"
            REPO_URL="${{ secrets.DEPLOY_GIT_URL || format('https://github.com/{0}.git', github.repository) }}"

            echo "=== Fresh Ubuntu 24 setup (idempotent) ==="

            # Install Docker + Docker Compose + Git if missing (fresh Ubuntu 24)
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker "$USER" 2>/dev/null || true
            fi
            if ! command -v git &>/dev/null; then
              echo "Installing Git..."
              sudo apt-get update -qq && sudo apt-get install -y git
            fi

            echo "=== Deploying to $DEPLOY_PATH ==="

            sudo mkdir -p "$DEPLOY_PATH"
            sudo chown "$USER:$USER" "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # Clone or pull
            if [ -d .git ]; then
              git fetch origin
              git reset --hard origin/main
              git pull origin main
            else
              git clone --depth 1 "$REPO_URL" .
            fi

            # Create .env if missing
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "Created .env from .env.example - edit ARI/AMI/MySQL in Settings or .env"
            fi

            # Deploy with Docker (use sudo for current session after fresh install)
            sudo docker compose pull --quiet 2>/dev/null || true
            sudo docker compose up -d --build

            echo "=== Deploy complete ==="
            sudo docker compose ps
